<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Flyer — Haymarket Tap</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fafaf8;
      color: #333;
    }
    h1 {
      color: #2c3e50;
      border-bottom: 2px solid #e74c3c;
      padding-bottom: 0.5rem;
    }
    dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem 1rem;
    }
    dt {
      font-weight: bold;
      color: #555;
    }
    dd {
      margin: 0;
    }
    .weather {
      background: #eef6ff;
      border-left: 4px solid #3498db;
      padding: 0.8rem;
      margin: 1rem 0;
    }
    .cost {
      background: #fef9e7;
      border-left: 4px solid #f1c40f;
      padding: 0.8rem;
      margin: 1rem 0;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #999;
    }
  </style>
</head>
<body>
  <article>
    <h1>🍺 Haymarket Tap — Event Booking</h1>
    <dl>
      <dt>Venue</dt>
      <dd data-testid="venue_name">Haymarket Tap</dd>
      <dt>Address</dt>
      <dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
      <dt>Date</dt>
      <dd data-testid="date">2026-04-25</dd>
      <dt>Time</dt>
      <dd data-testid="time">19:30</dd>
      <dt>Party Size</dt>
      <dd data-testid="party_size">6</dd>
    </dl>

    <div class="weather">
      <h2>Weather Forecast</h2>
      <dl>
        <dt>Condition</dt>
        <dd data-testid="condition">cloudy</dd>
        <dt>Temperature</dt>
        <dd data-testid="temperature">12°C</dd>
      </dl>
    </div>

    <div class="cost">
      <h2>Cost Breakdown</h2>
      <dl>
        <dt>Total</dt>
        <dd data-testid="total">£356</dd>
        <dt>Deposit Required</dt>
        <dd data-testid="deposit">£71</dd>
      </dl>
    </div>
  </article>
  <footer>Generated by Edinburgh Research Agent</footer>
</body>
</html>
